<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pump Curve Analyzer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155',
                            text: '#f1f5f9'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .chart-container {
            position: relative;
            margin: auto;
            /* Aumentado para que sea protagonista */
            height: 82vh;
            width: 100%;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #drop-zone.dragover {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.1);
            transform: scale(1.02);
        }
    </style>
</head>

<body
    class="bg-slate-50 dark:bg-dark-bg text-slate-900 dark:text-dark-text transition-colors duration-300 min-h-screen overflow-x-hidden">

    <!-- Navegación Superior Estrecha -->
    <nav class="sticky top-0 z-50 glass px-6 py-2 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            </div>
            <h1
                class="text-lg font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-500 dark:from-blue-400 dark:to-indigo-300">
                Pump Curve Analyzer
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="sheet-selector" class="flex flex-wrap gap-1"></div>
            <button id="theme-toggle"
                class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                <svg id="theme-toggle-dark-icon" class="hidden w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                </svg>
                <svg id="theme-toggle-light-icon" class="hidden w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path
                        d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z">
                    </path>
                </svg>
            </button>
        </div>
    </nav>

    <main class="w-full px-4 pb-4">
        <!-- Pantalla de Carga -->
        <section id="upload-section" class="max-w-3xl mx-auto mt-20">
            <div id="drop-zone"
                class="bg-white dark:bg-dark-card border-2 border-dashed border-slate-300 dark:border-slate-700 p-20 rounded-3xl shadow-2xl text-center transition-all duration-300">
                <div
                    class="mb-6 inline-flex p-4 bg-blue-50 dark:bg-blue-900/30 rounded-full text-blue-600 dark:text-blue-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold mb-2">Analizador de Curvas</h2>
                <p class="text-slate-500 dark:text-slate-400 mb-8 font-medium">Arrastra tu Excel para comenzar el
                    análisis visual.</p>

                <input class="hidden" id="file_input" type="file" accept=".xlsx, .xls, .csv, .xlsm">
                <button onclick="document.getElementById('file_input').click()"
                    class="px-10 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/30 transition-all hover:-translate-y-0.5 active:translate-y-0">
                    Seleccionar Archivo
                </button>
                <div id="file-info" class="mt-6 text-sm font-medium text-blue-500 animate-pulse"></div>
            </div>
        </section>

        <!-- Error Box -->
        <div id="errorBox"
            class="hidden max-w-2xl mx-auto mt-6 p-4 bg-red-50 dark:bg-red-900/20 border-l-4 border-red-500 text-red-700 dark:text-red-400 rounded-lg shadow-md">
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                        clip-rule="evenodd" />
                </svg>
                <p id="errorMsg" class="text-sm font-medium"></p>
            </div>
        </div>

        <!-- Área de Gráfico (Protagonista) -->
        <section id="resultContainer" class="hidden animate-in fade-in zoom-in duration-500 mt-2">
            <div
                class="bg-white dark:bg-dark-card p-4 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800">
                <div class="chart-container">
                    <canvas id="pumpChart"></canvas>
                </div>

                <div class="mt-4 flex flex-wrap justify-between items-center border-t dark:border-slate-800 pt-3 gap-4">
                    <div class="flex flex-wrap gap-x-6 gap-y-2 items-center text-slate-500 dark:text-slate-400">
                        <div class="flex items-center gap-2">
                            <span class="w-6 h-0.5 bg-blue-500"></span>
                            <span class="text-[10px] uppercase tracking-wider font-bold">Presión/Head</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-6 h-0.5 border-t-2 border-dashed border-slate-400"></span>
                            <span class="text-[10px] uppercase tracking-wider font-bold">Eficiencia (Opaca)</span>
                        </div>
                        <div class="flex items-center gap-2 text-blue-500 cursor-pointer hover:underline"
                            onclick="window.location.reload()">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            <span class="text-[10px] font-bold">CARGAR OTRO</span>
                        </div>
                    </div>
                    <div class="text-[10px] text-slate-400 italic font-medium">
                        * Doble eje activado. Escala de eficiencia fija 0-100%.
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- Tema ---
        const themeToggle = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
            lightIcon.classList.remove('hidden');
        } else {
            darkIcon.classList.remove('hidden');
        }

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');
            // Re-render chart on theme change to update colors
            if (myChart) {
                if (currentWorkbook) processSheet(currentSheetName);
                else if (lastAutoData) processAutoData(lastAutoData.data, lastAutoData.title);
            }
        });

        // --- Lógica ---
        let myChart = null;
        let currentWorkbook = null;
        let currentSheetName = "";
        let lastAutoData = null;
        const fileInput = document.getElementById('file_input');
        const dropZone = document.getElementById('drop-zone');

        fileInput.addEventListener('change', (e) => { if (e.target.files.length) loadWorkbook(e.target.files[0]); });
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) loadWorkbook(e.dataTransfer.files[0]);
        });

        // ESCUCHA DE MENSAJES PARA SINCRONIZACIÓN AUTOMÁTICA
        window.addEventListener('message', (event) => {
            const { type, data, title, theme, designColors, designLabels } = event.data;
            if (type === 'UPDATE_CHART') {
                console.log("Datos recibidos del Dashboard:", title);

                // Sincronizar tema con la app principal
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    document.getElementById('theme-toggle-light-icon').classList.remove('hidden');
                    document.getElementById('theme-toggle-dark-icon').classList.add('hidden');
                } else {
                    document.documentElement.classList.remove('dark');
                    document.getElementById('theme-toggle-dark-icon').classList.remove('hidden');
                    document.getElementById('theme-toggle-light-icon').classList.add('hidden');
                }

                lastAutoData = { data, title, theme, designColors, designLabels };
                processAutoData(data, title, designColors, designLabels);
            }
        });

        function processAutoData(data, title, designColors, designLabels) {
            if (!data || data.length === 0) return;

            document.getElementById('errorBox').classList.add('hidden');
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('resultContainer').classList.remove('hidden');

            const headers = Object.keys(data[0]);
            const labels = data.map(row => row.flow);
            const datasets = buildDatasets(headers, data, true, designColors, designLabels);

            renderChart(labels, datasets, title);
        }

        function loadWorkbook(file) {
            document.getElementById('file-info').innerText = "Abriendo: " + file.name;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    currentWorkbook = XLSX.read(data, { type: 'array' });

                    const selector = document.getElementById('sheet-selector');
                    selector.innerHTML = '';

                    currentWorkbook.SheetNames.forEach((name, index) => {
                        const btn = document.createElement('button');
                        btn.innerText = name;
                        btn.className = "px-3 py-1 rounded-md text-[10px] font-bold border border-slate-200 dark:border-slate-700 hover:bg-blue-600 hover:text-white transition-all";
                        btn.onclick = () => {
                            document.querySelectorAll('#sheet-selector button').forEach(b => b.classList.remove('bg-blue-600', 'text-white', 'border-blue-600'));
                            btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                            currentSheetName = name;
                            processSheet(name);
                        };
                        selector.appendChild(btn);
                        if (index === 0) btn.click();
                    });

                } catch (err) {
                    showError("Error al procesar: " + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function hexToRgba(hex, opacity) {
            let r = 0, g = 0, b = 0;
            if (hex.length == 4) {
                r = parseInt(hex[1] + hex[1], 16); g = parseInt(hex[2] + hex[2], 16); b = parseInt(hex[3] + hex[3], 16);
            } else if (hex.length == 7) {
                r = parseInt(hex.substring(1, 3), 16); g = parseInt(hex.substring(3, 5), 16); b = parseInt(hex.substring(5, 7), 16);
            }
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        }

        function buildDatasets(headers, rows, isAuto = false, designColors = [], designLabels = []) {
            const datasets = [];
            const colors = designColors.length ? designColors : ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4', '#ec4899', '#64748b', '#22c5e', '#f43f5e'];

            for (let j = 0; j < headers.length; j++) {
                const headName = headers[j];
                if (headName.toLowerCase() === 'flow') continue;

                const h = headName.toLowerCase();
                const isEff = h.includes('efficiency') || h.includes('%') || h.includes('eff');
                const isHz = h.includes('hz') || h.includes('pump head');
                const isLimit = h.includes('limit') || h.includes('range');
                const isSystem = h.includes('system');
                const isPoint = h.includes('target') || h.includes('point');

                // Color Logic
                let baseColor = colors[j % colors.length];
                let pumpSuffix = "";

                // Detectar si pertenece a Bomba 0, 1, 2 o 3 por el sufijo
                if (h.includes('_0')) {
                    baseColor = colors[0] || '#3b82f6';
                    pumpSuffix = designLabels[0] ? ` (${designLabels[0]})` : " (B1)";
                } else if (h.includes('_1')) {
                    baseColor = colors[1] || '#ef4444';
                    pumpSuffix = designLabels[1] ? ` (${designLabels[1]})` : " (B2)";
                } else if (h.includes('_2')) {
                    baseColor = colors[2] || '#10b981';
                    pumpSuffix = designLabels[2] ? ` (${designLabels[2]})` : " (B3)";
                } else if (h.includes('_3')) {
                    baseColor = colors[3] || '#a855f7';
                    pumpSuffix = designLabels[3] ? ` (${designLabels[3]})` : " (B4)";
                }

                const opacity = isEff ? 0.35 : (isHz ? 0.6 : (isLimit ? 0.6 : (isSystem ? 0.8 : (isPoint ? 1.0 : 1.0))));
                const width = isLimit ? 2 : (isHz ? 2.5 : (isSystem ? 3.5 : (isPoint ? 0 : 2.5)));

                let stopped = false;
                const chartData = rows.map((r, ri) => {
                    const val = isAuto ? r[headName] : r[j];
                    if (stopped) return null;
                    
                    const isHeadOrHz = h.includes('pump head') || h.includes('hz') || h.includes('tdh');
                    const numVal = parseFloat(val);

                    if (isHeadOrHz && !isEff && !isSystem && !isPoint) {
                        if (numVal > 0) return numVal;
                        if (ri > 0) { stopped = true; return null; }
                        return numVal; // Flow 0
                    }
                    return (val !== null && val !== undefined && !isNaN(val) && val >= 0) ? val : (isAuto && r.flow === 0 ? val : null);
                });

                datasets.push({
                    label: headName.replace(/(_0|_1|_2|_3)/g, '').toUpperCase().trim() + pumpSuffix,
                    data: chartData,
                    borderColor: isPoint ? baseColor : hexToRgba(baseColor, opacity),
                    backgroundColor: isPoint ? baseColor : 'transparent',
                    borderWidth: width,
                    // Solo System Head es sólida, el resto (incluida Pump Head) es punteada
                    borderDash: isSystem || isPoint ? [] : (isEff ? [8, 4] : [5, 5]),
                    pointRadius: isPoint ? 6 : 0,
                    pointHoverRadius: isPoint ? 8 : 10,
                    showLine: !isPoint,
                    tension: isSystem ? 0.1 : 0.3,
                    yAxisID: isEff ? 'y1' : 'y',
                    isEfficiency: isEff
                });
            }
            return datasets;
        }

        function processSheet(sheetName) {
            const sheet = currentWorkbook.Sheets[sheetName];
            const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null, blankrows: false });

            if (matrix.length < 2) return;

            document.getElementById('errorBox').classList.add('hidden');
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('resultContainer').classList.remove('hidden');

            const headers = matrix[0];
            const dataRows = matrix.slice(1);
            const sortedDataRows = dataRows.filter(row => row[0] !== null && !isNaN(parseFloat(row[0]))).sort((a, b) => parseFloat(a[0]) - parseFloat(b[0]));
            const labels = sortedDataRows.map(row => parseFloat(row[0]));

            const datasets = buildDatasets(headers, sortedDataRows, false);
            renderChart(labels, datasets, sheetName);
        }

        function renderChart(labels, datasets, title) {
            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#94a3b8' : '#64748b';
            const gridColor = isDark ? '#334155' : '#e2e8f0';

            const ctx = document.getElementById('pumpChart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 1000, easing: 'easeOutQuart' },
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        title: {
                            display: true,
                            text: title.toUpperCase(),
                            color: isDark ? '#f1f5f9' : '#0f172a',
                            font: { size: 14, weight: '900', family: 'system-ui' },
                            padding: { bottom: 20 }
                        },
                        legend: {
                            position: 'bottom',
                            labels: {
                                boxWidth: 30,
                                boxHeight: 2,
                                color: textColor,
                                font: { size: 10, weight: 'bold' },
                                padding: 15
                            }
                        },
                        tooltip: {
                            backgroundColor: isDark ? 'rgba(15, 23, 42, 0.9)' : 'rgba(255, 255, 255, 0.9)',
                            titleColor: isDark ? '#f1f5f9' : '#0f172a',
                            bodyColor: isDark ? '#cbd5e1' : '#334155',
                            borderColor: isDark ? '#475569' : '#cbd5e1',
                            borderWidth: 1,
                            padding: 12,
                            cornerRadius: 8,
                            usePointStyle: true,
                            callbacks: {
                                label: function (context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        label += context.parsed.y.toLocaleString();
                                        label += context.dataset.yAxisID === 'y1' ? ' %' : ' ft';
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            min: 0,
                            max: (context) => {
                                const maxVal = Math.max(...context.chart.data.labels);
                                return Math.ceil((maxVal * 1.1) / 500) * 500;
                            },
                            grid: { color: gridColor, drawTicks: false },
                            ticks: { color: textColor, font: { size: 10, weight: 'bold' } },
                            title: { display: true, text: 'FLOW (BPD)', color: textColor, font: { size: 11, weight: '900' } }
                        },
                        y: {
                            position: 'left',
                            min: 0,
                            max: (context) => {
                                let maxVal = 1000;
                                context.chart.data.datasets.forEach(ds => {
                                    if (ds.yAxisID === 'y') {
                                        const validData = ds.data.filter(v => v !== null && v !== undefined);
                                        if (validData.length > 0) {
                                            const dsMax = Math.max(...validData);
                                            if (dsMax > maxVal) maxVal = dsMax;
                                        }
                                    }
                                });
                                return Math.min(10000, Math.ceil((maxVal * 1.1) / 500) * 500);
                            },
                            grid: { color: gridColor, drawTicks: false },
                            ticks: { color: textColor, font: { size: 10, weight: 'bold' } },
                            title: { display: true, text: 'HEAD / PRESSURE (FT)', color: textColor, font: { size: 11, weight: '900' } }
                        },
                        y1: {
                            position: 'right',
                            min: 0,
                            max: 100,
                            grid: { display: false },
                            ticks: { color: textColor, font: { size: 10, weight: 'bold' } },
                            title: { display: true, text: 'EFFICIENCY (%)', color: textColor, font: { size: 11, weight: '900' } }
                        }
                    }
                }
            });
        }

        function showError(msg) {
            const err = document.getElementById('errorBox');
            document.getElementById('errorMsg').innerText = msg;
            err.classList.remove('hidden');
        }
    </script>
</body>

</html>
